name: Webapp CI

on:
  push:
   branches-ignore:
     - main

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Generate Prisma Client
        working-directory: app
        run: npx prisma generate

      - name: Run lint
        working-directory: app
        run: npm run lint

      - name: Run build
        working-directory: app
        run: npm run build
